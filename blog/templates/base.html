{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>ERM Data Entry Tool</title>

  <!-- Bootstrap -->
  <link rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css"
    crossorigin="anonymous">
  <link rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap-theme.min.css"
    crossorigin="anonymous">

  <!-- jQuery UI -->
  <link rel="stylesheet"
    href="https://code.jquery.com/ui/1.12.1/themes/ui-lightness/jquery-ui.css"
    crossorigin="anonymous">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/v4-shims.css">

  <!-- Site styles -->
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>

  <header class="site-header">
    <div class="header-top">
      <div class="brand">
        <a href="{% url 'home' %}" class="brand-title">
          ERM <span>Data Entry Tool</span>
        </a>
        <span class="brand-subtitle">Qualitative Analysis &amp; Portfolio Research</span>
      </div>

      <div class="auth-section">
        {% if user.is_authenticated %}
          <i class="fas fa-user-circle"></i>
          <span class="username">{{ user.username }}</span>
          <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i> Log Out</a>
        {% else %}
          <span>Not logged in</span>
          <a href="{% url 'login' %}"><i class="fas fa-sign-in-alt"></i> Log In</a>
        {% endif %}
      </div>
    </div>

    <nav class="site-nav">
      <a href="{% url 'post_new' %}" class="nav-primary">
        <i class="fas fa-plus"></i> Add Stock
      </a>
      <a href="{% url 'summary_posts' %}">
        <i class="fas fa-list-alt"></i> Summary
      </a>
      <a href="{% url 'portfolio_view' %}">
        <i class="fas fa-chart-line"></i> Portfolio Statistics
      </a>
    </nav>
  </header>

  <main class="page-wrapper">
    {% block content %}{% endblock content %}
  </main>

  <!-- Scripts -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"
    crossorigin="anonymous"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"
    crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"
    crossorigin="anonymous"></script>

</body>
</html>
